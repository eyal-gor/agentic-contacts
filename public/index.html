<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Agentic Contacts</title>
<style>
  /* Flat design: solid colors, no shadows, no gradients, no rounded depth. */
  :root {
    --bg: #ecf0f1; --surface: #ffffff; --ink: #2c3e50; --mut: #7f8c8d;
    --line: #dfe4e6; --accent: #3498db;
    --lead:#95a5a6; --contacted:#3498db; --call:#9b59b6; --trial:#f1c40f;
    --proposal:#e67e22; --won:#2ecc71; --lost:#bdc3c7;
    --over:#e74c3c; --soon:#f39c12; --ok:#2ecc71;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--ink);
    font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  header { display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
    padding: 12px 20px; background: var(--surface); position: sticky; top: 0; z-index: 5; }
  h1 { font-size: 17px; margin: 0; font-weight: 700; }
  .grow { flex: 1; }
  .seg { display: inline-flex; }
  .seg button { background: #d6dbdd; color: var(--ink); border: 0; padding: 7px 14px;
    cursor: pointer; font: inherit; font-weight: 600; }
  .seg button.on { background: var(--accent); color: #fff; }
  .toggle { color: var(--mut); display: inline-flex; align-items: center; gap: 6px; cursor: pointer; user-select: none; font-weight: 600; }
  .iconbtn { background: var(--accent); border: 0; color: #fff; padding: 7px 14px; cursor: pointer; font: inherit; font-weight: 600; }
  .iconbtn.ghost { background: #d6dbdd; color: var(--ink); }
  .search { background: #eef1f2; border: 0; padding: 8px 12px; font: inherit; color: var(--ink); width: 240px; }
  .search:focus { outline: 0; background: #e3e8ea; }
  .search::placeholder { color: var(--mut); }
  select.flat { background: #eef1f2; border: 0; padding: 7px 10px; font: inherit; color: var(--ink); font-weight: 600; }
  .toolbar { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; padding: 12px 20px 0; }
  .hide { display: none !important; }

  /* Contacts list */
  .clist { padding: 12px 20px 28px; display: flex; flex-direction: column; gap: 6px; }
  .crow { background: var(--surface); border-left: 4px solid var(--mut); padding: 10px 14px;
    display: grid; grid-template-columns: 1.4fr 1.3fr 1fr; gap: 12px; align-items: center; cursor: pointer; }
  .crow:hover { background: #f6f9fa; }
  .crow .nm { font-weight: 700; } .crow .co { color: var(--mut); }
  .crow .tags { display: flex; flex-wrap: wrap; gap: 4px; }
  .crow .meta { color: var(--mut); font-size: 12.5px; text-align: right; }

  /* Pipeline board */
  .board { display: flex; gap: 12px; padding: 16px 20px; overflow-x: auto; align-items: flex-start; }
  .col { background: transparent; min-width: 250px; width: 250px; flex: 0 0 auto;
    display: flex; flex-direction: column; max-height: calc(100vh - 180px); }
  .col h2 { font-size: 12px; letter-spacing: .08em; text-transform: uppercase; color: #fff;
    margin: 0; padding: 10px 14px; display: flex; justify-content: space-between; font-weight: 700; background: var(--mut); }
  .col h2 .cnt { color: #fff; opacity: .85; }
  .col[data-stage=lead] h2{background:var(--lead)} .col[data-stage=contacted] h2{background:var(--contacted)}
  .col[data-stage=call] h2{background:var(--call)} .col[data-stage=trial] h2{background:var(--trial);color:#2c3e50}
  .col[data-stage=trial] h2 .cnt{color:#2c3e50}
  .col[data-stage=proposal] h2{background:var(--proposal)} .col[data-stage=won] h2{background:var(--won)}
  .col[data-stage=lost] h2{background:var(--lost);color:#2c3e50} .col[data-stage=lost] h2 .cnt{color:#2c3e50}
  .drop { padding: 10px; overflow-y: auto; flex: 1; min-height: 60px; background: #e2e7e9; }
  .col.dragover .drop { background: #d0d9db; }
  .card { background: var(--surface); border-left: 4px solid var(--mut); padding: 10px 12px; margin-bottom: 8px; cursor: grab; }
  .col[data-stage=lead] .card{border-left-color:var(--lead)} .col[data-stage=contacted] .card{border-left-color:var(--contacted)}
  .col[data-stage=call] .card{border-left-color:var(--call)} .col[data-stage=trial] .card{border-left-color:var(--trial)}
  .col[data-stage=proposal] .card{border-left-color:var(--proposal)} .col[data-stage=won] .card{border-left-color:var(--won)}
  .col[data-stage=lost] .card{border-left-color:var(--lost)}
  .card:active { cursor: grabbing; }
  .card .nm { font-weight: 700; } .card .co { color: var(--mut); font-size: 12.5px; }
  .card .meta { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 7px; align-items: center; }

  .pill { font-size: 11px; padding: 2px 8px; color: #fff; background: var(--mut); font-weight: 600; }
  .pill.icp { background: var(--accent); }
  .pill.stage { background: var(--ink); }
  .pill.next.over { background: var(--over); } .pill.next.soon { background: var(--soon); color: #2c3e50; }
  .pill.next.ok { background: var(--ok); }
  .empty { color: var(--mut); text-align: center; padding: 24px 0; }

  /* modal / detail */
  .scrim { position: fixed; inset: 0; background: rgba(44,62,80,.5); display: none; align-items: center; justify-content: center; z-index: 20; }
  .scrim.on { display: flex; }
  .modal { background: var(--surface); width: 540px; max-width: calc(100vw - 32px); max-height: calc(100vh - 48px);
    overflow: auto; padding: 20px 22px; border-top: 5px solid var(--accent); }
  .modal h3 { margin: 0 0 2px; font-weight: 700; }
  .modal .sub { color: var(--mut); margin-bottom: 14px; }
  .row { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
  .row > div { flex: 1; min-width: 140px; }
  label { display: block; font-size: 12px; color: var(--mut); margin-bottom: 4px; font-weight: 600; }
  input, textarea, select.field { width: 100%; background: var(--bg); border: 0; border-bottom: 2px solid var(--line);
    color: var(--ink); padding: 8px 10px; font: inherit; }
  input:focus, textarea:focus, select.field:focus { outline: 0; border-bottom-color: var(--accent); }
  textarea { min-height: 64px; resize: vertical; }
  .btn { background: var(--accent); color: #fff; border: 0; padding: 9px 16px; cursor: pointer; font: inherit; font-weight: 700; }
  .btn.ghost { background: #d6dbdd; color: var(--ink); }
  .btn.danger { background: var(--over); color: #fff; }
  .actions { display: flex; gap: 8px; justify-content: flex-end; align-items: center; margin-top: 4px; }
  .hist { border-top: 2px solid var(--line); margin-top: 16px; padding-top: 10px; }
  .hist .it { display: flex; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--line); }
  .hist .it .w { color: var(--mut); white-space: nowrap; font-size: 12px; }
  .x { float: right; cursor: pointer; color: var(--mut); font-size: 22px; line-height: 1; font-weight: 700; }
  .toast { position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%); background: var(--ink); color: #fff;
    padding: 10px 18px; font-weight: 600; opacity: 0; transition: opacity .2s; pointer-events: none; z-index: 30; }
  .toast.on { opacity: 1; }
</style>
</head>
<body>
<header>
  <h1>Agentic Contacts</h1>
  <div class="seg" id="nav">
    <button data-view="contacts" class="on">Contacts</button>
    <button data-view="pipeline">Pipeline</button>
  </div>
  <input class="search" id="search" placeholder="Search name / company / tag / notes…" />
  <div class="grow"></div>
  <span id="stat" style="color:var(--mut)"></span>
  <button class="iconbtn" id="newBtn">+ New</button>
  <button class="iconbtn ghost" id="refresh">Refresh</button>
</header>

<!-- CONTACTS VIEW -->
<section id="viewContacts">
  <div class="toolbar">
    <select class="flat" id="tagFilter"><option value="">All tags</option></select>
    <select class="flat" id="sort">
      <option value="name">Sort: Name</option>
      <option value="recent">Sort: Recently talked</option>
      <option value="stale">Sort: Neglected first</option>
      <option value="next">Sort: Follow-up due</option>
    </select>
    <span id="cstat" style="color:var(--mut)"></span>
  </div>
  <div class="clist" id="clist"></div>
</section>

<!-- PIPELINE VIEW -->
<section id="viewPipeline" class="hide">
  <div class="toolbar">
    <div class="seg" id="icp">
      <button data-icp="" class="on">All ICP</button>
      <button data-icp="dev">dev</button>
      <button data-icp="biz">biz</button>
    </div>
    <div class="seg" id="due">
      <button data-due="" class="on">Any date</button>
      <button data-due="over">Overdue</button>
      <button data-due="week">Due ≤7d</button>
    </div>
    <label class="toggle"><input type="checkbox" id="showAll" /> show non-sales</label>
  </div>
  <div class="board" id="board"></div>
</section>

<div class="scrim" id="scrim"><div class="modal" id="modal"></div></div>
<div class="toast" id="toast"></div>

<script>
const STAGES = ["lead","contacted","call","trial","proposal","won","lost"];
const NON_SALES = ["advice","recruiting","do-not-contact"];
const TODAY = "2026-06-24"; // server "today"; UI compares date strings
let CONTACTS = [];
let view = "contacts";
let icpFilter = "", dueFilter = "", search = "", tagFilter = "", sortBy = "name";
let detailId = null;

const $ = (s, r=document) => r.querySelector(s);
const api = async (path, init) => {
  const r = await fetch(path, init && { ...init, headers: { "Content-Type":"application/json", ...(init.headers||{}) }});
  const t = await r.text(); const d = t ? JSON.parse(t) : null;
  if (!r.ok) throw new Error(d?.error || r.statusText);
  return d;
};
const stageOf = c => (c.tags||[]).find(t=>t.startsWith("stage:"))?.slice(6) || null;
const icpOf   = c => (c.tags||[]).find(t=>t.startsWith("icp:"))?.slice(4) || null;
const freeTags = c => (c.tags||[]).filter(t=>!t.startsWith("stage:")&&!t.startsWith("icp:"));
const esc = s => (s??"").replace(/[&<>"]/g, m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]));
const lastDate = c => c.lastInteraction?.occurredAt?.slice(0,10) || "";
function toast(m){ const t=$("#toast"); t.textContent=m; t.classList.add("on"); setTimeout(()=>t.classList.remove("on"),1600); }
function weekFromToday(){ const w = new Date(TODAY); w.setDate(w.getDate()+7); return w.toISOString().slice(0,10); }
function nextClass(d){ if(!d) return ""; const day=d.slice(0,10); if(day<TODAY) return "over"; return day<=weekFromToday()?"soon":"ok"; }

function matchesSearch(c){
  if (!search) return true; const q = search.toLowerCase();
  return [c.name, c.company, c.title, c.notes, ...(c.emails||[]), ...(c.tags||[])]
    .filter(Boolean).some(v => String(v).toLowerCase().includes(q));
}

async function load(){ CONTACTS = (await api("/contacts?limit=1000")).contacts; rebuildTagFilter(); renderActive(); }

function rebuildTagFilter(){
  const sel = $("#tagFilter"); const cur = sel.value;
  const tags = [...new Set(CONTACTS.flatMap(c => c.tags||[]))].sort();
  sel.innerHTML = `<option value="">All tags</option>` + tags.map(t=>`<option ${t===cur?"selected":""}>${esc(t)}</option>`).join("");
}

function renderActive(){ view === "pipeline" ? renderPipeline() : renderContacts(); }

/* ---------- Contacts view ---------- */
function renderContacts(){
  let cs = CONTACTS.filter(matchesSearch);
  if (tagFilter) cs = cs.filter(c => (c.tags||[]).includes(tagFilter));
  cs.sort((a,b)=>{
    if (sortBy==="name") return a.name.localeCompare(b.name);
    if (sortBy==="next") return (a.followUpAt||"9999")<(b.followUpAt||"9999")?-1:1;
    const av=lastDate(a), bv=lastDate(b);
    if (av===bv) return 0; if(!av) return sortBy==="stale"?-1:1; if(!bv) return sortBy==="stale"?1:-1;
    return (av<bv?-1:1)*(sortBy==="stale"?1:-1);
  });
  const box = $("#clist"); box.innerHTML = "";
  if (!cs.length) box.innerHTML = `<div class="empty">No contacts match.</div>`;
  for (const c of cs){
    const st = stageOf(c), icp = icpOf(c), nc = nextClass(c.followUpAt);
    const el = document.createElement("div"); el.className="crow"; el.dataset.id=c.id;
    el.style.borderLeftColor = st ? `var(--${st})` : "var(--mut)";
    el.innerHTML = `
      <div><span class="nm">${esc(c.name)}</span>${c.company?` <span class="co">· ${esc(c.company)}</span>`:""}${c.title?`<div class="co">${esc(c.title)}</div>`:""}</div>
      <div class="tags">
        ${st?`<span class="pill stage">${st}</span>`:""}
        ${icp?`<span class="pill icp">icp:${esc(icp)}</span>`:""}
        ${freeTags(c).map(t=>`<span class="pill">${esc(t)}</span>`).join("")}
      </div>
      <div class="meta">
        ${lastDate(c)?`last ${lastDate(c)}`:"never talked"}
        ${c.followUpAt?` · <span class="pill next ${nc}">next ${c.followUpAt.slice(0,10)}</span>`:""}
      </div>`;
    el.addEventListener("click", ()=>openDetail(c.id));
    box.appendChild(el);
  }
  $("#cstat").textContent = `${cs.length} of ${CONTACTS.length} contacts`;
  $("#stat").textContent = "";
}

/* ---------- Pipeline view ---------- */
function pipelineSet(){
  let cs = CONTACTS.filter(c => stageOf(c));
  if (!$("#showAll").checked) cs = cs.filter(c => !(c.tags||[]).some(t=>NON_SALES.includes(t)));
  if (icpFilter) cs = cs.filter(c => icpOf(c) === icpFilter);
  cs = cs.filter(matchesSearch);
  if (dueFilter){ const wk=weekFromToday(); cs = cs.filter(c=>{ if(!c.followUpAt) return false;
    const d=c.followUpAt.slice(0,10); return dueFilter==="over"?d<TODAY:d<=wk; }); }
  return cs;
}
function renderPipeline(){
  const cs = pipelineSet(); const board = $("#board"); board.innerHTML="";
  for (const st of STAGES){
    const rows = cs.filter(c=>stageOf(c)===st);
    const col=document.createElement("div"); col.className="col "+st; col.dataset.stage=st;
    col.innerHTML=`<h2>${st} <span class="cnt">${rows.length}</span></h2><div class="drop"></div>`;
    const drop=$(".drop",col); if(!rows.length) drop.innerHTML=`<div class="empty">—</div>`;
    for (const c of rows){
      const el=document.createElement("div"); el.className="card"; el.draggable=true;
      const icp=icpOf(c), nc=nextClass(c.followUpAt);
      el.innerHTML=`<div class="nm">${esc(c.name)}</div>${c.company?`<div class="co">${esc(c.company)}</div>`:""}
        <div class="meta">${icp?`<span class="pill icp">icp:${esc(icp)}</span>`:""}
        ${c.followUpAt?`<span class="pill next ${nc}">${c.followUpAt.slice(0,10)}</span>`:""}
        ${freeTags(c).slice(0,2).map(t=>`<span class="pill">${esc(t)}</span>`).join("")}</div>`;
      el.addEventListener("dragstart",e=>e.dataTransfer.setData("text/plain",c.id));
      el.addEventListener("click",()=>openDetail(c.id));
      drop.appendChild(el);
    }
    col.addEventListener("dragover",e=>{e.preventDefault();col.classList.add("dragover");});
    col.addEventListener("dragleave",()=>col.classList.remove("dragover"));
    col.addEventListener("drop",async e=>{e.preventDefault();col.classList.remove("dragover");
      await moveStage(e.dataTransfer.getData("text/plain"),st);});
    board.appendChild(col);
  }
  const over = cs.filter(c=>c.followUpAt && c.followUpAt.slice(0,10)<TODAY).length;
  $("#stat").textContent = `${cs.length} in pipeline${over?` · ${over} overdue`:""}`;
}
async function moveStage(id,stage){
  const c=CONTACTS.find(x=>x.id===id); if(!c||stageOf(c)===stage) return;
  const tags=(c.tags||[]).filter(t=>!t.startsWith("stage:")).concat("stage:"+stage);
  const u=await api(`/contacts/${id}`,{method:"PATCH",body:JSON.stringify({tags})});
  c.tags=u.tags; renderPipeline(); toast(`${c.name} → ${stage}`);
}

/* ---------- Detail / create / edit ---------- */
async function openDetail(id){
  detailId = id;
  const c = id ? await api(`/contacts/${id}`) : { tags:[], emails:[], phones:[] };
  const hist = id ? (await api(`/contacts/${id}/interactions`)).interactions : [];
  const stage = stageOf(c)||"", icp = icpOf(c)||"";
  $("#modal").innerHTML = `
    <span class="x" onclick="closeModal()">×</span>
    <h3>${id?esc(c.name):"New contact"}</h3>
    <div class="sub">${id?"Edit contact, log interactions, set follow-up":"Add someone to your contacts"}</div>
    <div class="row">
      <div><label>Name</label><input id="dName" value="${esc(c.name)}"></div>
      <div><label>Company</label><input id="dCompany" value="${esc(c.company)}"></div>
    </div>
    <div class="row">
      <div><label>Title</label><input id="dTitle" value="${esc(c.title)}"></div>
      <div><label>LinkedIn</label><input id="dLinkedin" value="${esc(c.linkedin)}"></div>
    </div>
    <div class="row">
      <div><label>Emails (comma-sep)</label><input id="dEmails" value="${esc((c.emails||[]).join(", "))}"></div>
      <div><label>Phones (comma-sep)</label><input id="dPhones" value="${esc((c.phones||[]).join(", "))}"></div>
    </div>
    <div class="row">
      <div><label>Stage</label><select class="field" id="dStage"><option value="">— none —</option>${STAGES.map(s=>`<option ${s===stage?"selected":""}>${s}</option>`).join("")}</select></div>
      <div><label>ICP</label><select class="field" id="dIcp"><option value="">— none —</option>${["dev","biz"].map(s=>`<option ${s===icp?"selected":""}>${s}</option>`).join("")}</select></div>
    </div>
    <div class="row"><div><label>Other tags (comma-sep)</label><input id="dTags" value="${esc(freeTags(c).join(", "))}"></div></div>
    <div class="row">
      <div><label>Next follow-up</label><input type="date" id="dNext" value="${c.followUpAt?c.followUpAt.slice(0,10):""}"></div>
      <div><label>About</label><input id="dNextNote" value="${esc(c.followUpNote)}"></div>
    </div>
    <div class="row"><div><label>Notes</label><textarea id="dNotes">${esc(c.notes)}</textarea></div></div>
    <div class="actions">
      ${id?`<button class="btn danger" id="delBtn">Delete</button>`:""}
      <div class="grow"></div>
      <button class="btn ghost" onclick="closeModal()">Close</button>
      <button class="btn" id="saveBtn">Save</button>
    </div>
    ${id?`
    <div class="hist">
      <label>Log interaction</label>
      <div class="row">
        <div style="flex:0 0 130px"><select class="field" id="logCh">${["call","email","meeting","message","note"].map(x=>`<option>${x}</option>`).join("")}</select></div>
        <div style="flex:1"><input id="logSum" placeholder="what happened…"></div>
        <button class="btn" id="logBtn">Log</button>
      </div>
      ${hist.length?hist.map(i=>`<div class="it"><span class="w">${i.occurredAt.slice(0,10)} · ${i.channel}</span><span>${esc(i.summary)}</span></div>`).join(""):`<div class="empty">No interactions yet.</div>`}
    </div>`:""}`;
  $("#saveBtn").onclick = saveDetail;
  if (id){ $("#delBtn").onclick = ()=>delContact(id); $("#logBtn").onclick = ()=>logInteraction(id); }
  $("#scrim").classList.add("on");
}
function closeModal(){ $("#scrim").classList.remove("on"); detailId=null; }
window.closeModal = closeModal;

async function saveDetail(){
  const v = s => $("#"+s).value.trim();
  const arr = s => v(s).split(",").map(x=>x.trim()).filter(Boolean);
  const stage = $("#dStage").value, icp = $("#dIcp").value;
  const tags = [...arr("dTags").filter(t=>!t.startsWith("stage:")&&!t.startsWith("icp:"))];
  if (stage) tags.push("stage:"+stage); if (icp) tags.push("icp:"+icp);
  const body = { name:v("dName"), company:v("dCompany"), title:v("dTitle"), linkedin:v("dLinkedin"),
    emails:arr("dEmails"), phones:arr("dPhones"), tags, notes:v("dNotes"),
    followUpAt:v("dNext")||null, followUpNote:v("dNextNote")||null };
  if (!body.name){ toast("Name is required"); return; }
  try {
    if (detailId) await api(`/contacts/${detailId}`,{method:"PATCH",body:JSON.stringify(body)});
    else await api(`/contacts`,{method:"POST",body:JSON.stringify(body)});
    closeModal(); await load(); toast("Saved");
  } catch(e){ toast("Error: "+e.message); }
}
async function delContact(id){
  if (!confirm("Delete this contact and its history?")) return;
  await api(`/contacts/${id}`,{method:"DELETE"}); closeModal(); await load(); toast("Deleted");
}
async function logInteraction(id){
  const sum = $("#logSum").value.trim(); if(!sum){ toast("Write what happened"); return; }
  await api(`/contacts/${id}/interactions`,{method:"POST",body:JSON.stringify({channel:$("#logCh").value,summary:sum})});
  await load(); openDetail(id); toast("Logged");
}

/* ---------- wiring ---------- */
function showView(v){
  view=v; $("#viewContacts").classList.toggle("hide",v!=="contacts");
  $("#viewPipeline").classList.toggle("hide",v!=="pipeline");
  [...$("#nav").children].forEach(b=>b.classList.toggle("on",b.dataset.view===v));
  renderActive();
}
$("#nav").addEventListener("click",e=>{const b=e.target.closest("button");if(b)showView(b.dataset.view);});
$("#icp").addEventListener("click",e=>{const b=e.target.closest("button");if(!b)return;icpFilter=b.dataset.icp;
  [...$("#icp").children].forEach(x=>x.classList.toggle("on",x===b));renderPipeline();});
$("#due").addEventListener("click",e=>{const b=e.target.closest("button");if(!b)return;dueFilter=b.dataset.due;
  [...$("#due").children].forEach(x=>x.classList.toggle("on",x===b));renderPipeline();});
$("#showAll").addEventListener("change",renderPipeline);
$("#search").addEventListener("input",e=>{search=e.target.value.trim();renderActive();});
$("#tagFilter").addEventListener("change",e=>{tagFilter=e.target.value;renderContacts();});
$("#sort").addEventListener("change",e=>{sortBy=e.target.value;renderContacts();});
$("#newBtn").addEventListener("click",()=>openDetail(null));
$("#refresh").addEventListener("click",load);
$("#scrim").addEventListener("click",e=>{if(e.target.id==="scrim")closeModal();});
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeModal();});

load().catch(e=>$("#clist").innerHTML=`<div class="empty">Failed to load: ${esc(e.message)}<br>Is the API on :8787?</div>`);
</script>
</body>
</html>
